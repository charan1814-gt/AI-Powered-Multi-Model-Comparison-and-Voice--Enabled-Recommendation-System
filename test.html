<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - AI Comparison Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
            text-align: center;
        }
        .status-grid {
            display: grid;
            gap: 1rem;
            margin-top: 2rem;
        }
        .status-card {
            padding: 1rem;
            border-radius: 0.5rem;
            border-left: 4px solid #ccc;
        }
        .status-pending {
            background: #fef3c7;
            border-color: #f59e0b;
        }
        .status-success {
            background: #d1fae5;
            border-color: #10b981;
        }
        .status-error {
            background: #fee2e2;
            border-color: #ef4444;
        }
        .status-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }
        .status-card p {
            color: #6b7280;
            font-size: 0.9rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1.5rem;
        }
        button:hover {
            background: #1e40af;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .info-box p {
            color: #1e40af;
            font-size: 0.9rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 API Configuration Test</h1>
        
        <div class="info-box">
            <p><strong>Important:</strong> Make sure you've added your API keys to the <code>.env</code> file before testing. See <code>API_SETUP.md</code> for detailed instructions.</p>
        </div>

        <button id="testBtn" onclick="testAPIs()">Test All API Keys</button>

        <div class="status-grid" id="statusGrid">
            <div class="status-card status-pending">
                <h3>🟢 OpenAI (ChatGPT)</h3>
                <p id="openai-status">Not tested yet</p>
            </div>
            <div class="status-card status-pending">
                <h3>🔵 Google Gemini</h3>
                <p id="gemini-status">Not tested yet</p>
            </div>
            <div class="status-card status-pending">
                <h3>🧬 Replicate</h3>
                <p id="replicate-status">Not tested yet</p>
            </div>
            <div class="status-card status-pending">
                <h3>⚫ DeepSeek</h3>
                <p id="deepseek-status">Not tested yet</p>
            </div>
        </div>
    </div>

    <script>
        async function testAPIs() {
            const testBtn = document.getElementById('testBtn');
            testBtn.disabled = true;
            testBtn.textContent = 'Testing APIs...';

            const testPrompt = "Say 'Hello' in one word";

            try {
                const response = await fetch('http://localhost:3000/api/compare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: testPrompt })
                });

                const data = await response.json();

                if (data.success) {
                    updateStatus('openai', data.responses.chatgpt);
                    updateStatus('gemini', data.responses.gemini);
                    updateStatus('replicate', data.responses.replicate);
                    updateStatus('deepseek', data.responses.deepseek);
                } else {
                    alert('Server error: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                alert('Failed to connect to server. Make sure the server is running with: npm start');
                console.error('Test error:', error);
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = 'Test All API Keys Again';
            }
        }

        function updateStatus(provider, data) {
            const statusElement = document.getElementById(`${provider}-status`);
            const cardElement = statusElement.closest('.status-card');

            if (data.success) {
                statusElement.textContent = `✅ Connected successfully! (${(data.responseTime / 1000).toFixed(2)}s)`;
                cardElement.className = 'status-card status-success';
            } else {
                statusElement.textContent = `❌ ${data.error || 'Connection failed. Check API key in .env file'}`;
                cardElement.className = 'status-card status-error';
            }
        }
    </script>
</body>
</html>
